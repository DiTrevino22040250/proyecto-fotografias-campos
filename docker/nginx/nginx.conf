events {
    worker_connections 1024;
}

http {
    upstream api1 {
        server api1:8080;
    }
    upstream api2 {
        server api2:3001;
    }
    upstream api3 {
        server api3:8080;
    }

    # Limite de peticiones para evitar ataques
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=20r/m;

    server {
        listen 80;

        # Cabeceras de seguridad
        add_header X-Frame-Options "DENY";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # API 1 - Pedidos
        location /api/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://api1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API 2 - Estado Pedidos
        location /estado/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://api2/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API 3 - Query (Solo lectura)
        location /query/ {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://api3;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
