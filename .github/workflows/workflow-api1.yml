name: API 1 - .NET Build and Verify

on:
  workflow_call:
    secrets:
      MYSQL_ROOT_PASSWORD:
        required: true
      JWT_KEY:
        required: true
      JWT_ISSUER:
        required: true
      JWT_AUDIENCE:
        required: true

jobs:
  build-api1:
    uses: ./.github/workflows/reusable-build.yml
    with:
      service_name: api1
      dockerfile_path: ./fotografiasCampos.api/Dockerfile
      context_path: ./fotografiasCampos.api
      port: "5000"
    secrets:
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}

  test-api1:
    runs-on: ubuntu-latest
    needs: build-api1
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependencias
        run: |
          cd fotografiasCampos.api
          dotnet restore

      - name: Build API 1
        run: |
          cd fotografiasCampos.api
          dotnet build --no-restore

      - name: ✅ API 1 verificada
        run: echo "✅ API 1 (.NET) build exitoso"