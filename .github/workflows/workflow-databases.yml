name: Databases - Verify MySQL Setup

on:
  workflow_call:
    secrets:
      MYSQL_ROOT_PASSWORD:
        required: true

jobs:
  verify-databases:
    runs-on: ubuntu-latest
    services:
      db1:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: fotografias_campos
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      db2:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: estado_pedidos
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      db_replica:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        ports:
          - 3309:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar db1
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          mysql -h 127.0.0.1 -P 3307 -uroot -p$MYSQL_ROOT_PASSWORD -e "SHOW DATABASES;"
          echo "✅ DB1 lista"

      - name: Verificar db2
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          mysql -h 127.0.0.1 -P 3308 -uroot -p$MYSQL_ROOT_PASSWORD -e "SHOW DATABASES;"
          echo "✅ DB2 lista"

      - name: Verificar db_replica
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          mysql -h 127.0.0.1 -P 3309 -uroot -p$MYSQL_ROOT_PASSWORD -e "SHOW DATABASES;"
          echo "✅ DB Réplica lista"