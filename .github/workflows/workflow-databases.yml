name: Databases - Verify MySQL Setup

on:
  workflow_call:
    secrets:
      MYSQL_ROOT_PASSWORD:
        required: true

jobs:
  verify-databases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Levantar bases de datos
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          docker run -d \
            --name db1 \
            -e MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD \
            -e MYSQL_DATABASE=fotografias_campos \
            -p 3307:3306 \
            mysql:8.0 \
            --server-id=1 \
            --log-bin=mysql-bin \
            --binlog-format=ROW

          docker run -d \
            --name db2 \
            -e MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD \
            -e MYSQL_DATABASE=estado_pedidos \
            -p 3308:3306 \
            mysql:8.0 \
            --server-id=2 \
            --log-bin=mysql-bin \
            --binlog-format=ROW

          docker run -d \
            --name db_replica \
            -e MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD \
            -p 3309:3306 \
            mysql:8.0 \
            --server-id=3 \
            --read-only=1

      - name: Esperar que MySQL esté listo
        run: |
          echo "Esperando bases de datos..."
          sleep 30

      - name: Verificar db1
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          docker exec db1 mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD
          echo "✅ DB1 lista"

      - name: Verificar db2
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          docker exec db2 mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD
          echo "✅ DB2 lista"

      - name: Verificar db_replica
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
        run: |
          docker exec db_replica mysqladmin ping -h localhost -p$MYSQL_ROOT_PASSWORD
          echo "✅ DB Réplica lista"