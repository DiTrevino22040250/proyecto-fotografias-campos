name: Databases - Verify MySQL Setup

on:
  workflow_call:
    secrets:
      MYSQL_ROOT_PASSWORD:
        required: true

jobs:
  verify-databases:
    runs-on: ubuntu-latest
    services:
      db1:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: fotografias_campos
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      db2:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: estado_pedidos
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      db_replica:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
        ports:
          - 3309:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar bases de datos y guardar info
        run: |
          mkdir -p docker-info

          echo "=== BASES DE DATOS ===" > docker-info/databases-info.txt
          echo "Fecha: $(date)" >> docker-info/databases-info.txt
          echo "" >> docker-info/databases-info.txt

          echo "--- DB1 (fotografias_campos) ---" >> docker-info/databases-info.txt
          mysql -h 127.0.0.1 -P 3307 -uroot -prootpassword -e "SHOW DATABASES;" >> docker-info/databases-info.txt
          echo "✅ DB1 lista" >> docker-info/databases-info.txt
          echo "" >> docker-info/databases-info.txt

          echo "--- DB2 (estado_pedidos) ---" >> docker-info/databases-info.txt
          mysql -h 127.0.0.1 -P 3308 -uroot -prootpassword -e "SHOW DATABASES;" >> docker-info/databases-info.txt
          echo "✅ DB2 lista" >> docker-info/databases-info.txt
          echo "" >> docker-info/databases-info.txt

          echo "--- DB_REPLICA ---" >> docker-info/databases-info.txt
          mysql -h 127.0.0.1 -P 3309 -uroot -prootpassword -e "SHOW DATABASES;" >> docker-info/databases-info.txt
          echo "✅ DB Réplica lista" >> docker-info/databases-info.txt

          cat docker-info/databases-info.txt

      - name: Subir artifact con información de bases de datos
        uses: actions/upload-artifact@v4
        with:
          name: docker-info-databases
          path: docker-info/databases-info.txt
          retention-days: 30