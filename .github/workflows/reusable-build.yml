name: Reusable Build and Verify

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      context_path:
        required: true
        type: string
      port:
        required: true
        type: string
    secrets:
      MYSQL_ROOT_PASSWORD:
        required: true
      JWT_KEY:
        required: true
      JWT_ISSUER:
        required: true
      JWT_AUDIENCE:
        required: true
      API2_EMAIL_USER:
        required: false
      API2_EMAIL_PASS:
        required: false

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: |
          docker build \
            -f ${{ inputs.dockerfile_path }} \
            -t ${{ inputs.service_name }}:test \
            ${{ inputs.context_path }}

      - name: Guardar información del contenedor
        run: |
          mkdir -p docker-info
          echo "=== INFORMACIÓN DEL CONTENEDOR ${{ inputs.service_name }} ===" > docker-info/${{ inputs.service_name }}-info.txt
          echo "Fecha: $(date)" >> docker-info/${{ inputs.service_name }}-info.txt
          echo "Puerto: ${{ inputs.port }}" >> docker-info/${{ inputs.service_name }}-info.txt
          echo "Dockerfile: ${{ inputs.dockerfile_path }}" >> docker-info/${{ inputs.service_name }}-info.txt
          echo "Contexto: ${{ inputs.context_path }}" >> docker-info/${{ inputs.service_name }}-info.txt
          echo "" >> docker-info/${{ inputs.service_name }}-info.txt
          echo "=== IMAGEN DOCKER ===" >> docker-info/${{ inputs.service_name }}-info.txt
          docker images ${{ inputs.service_name }}:test >> docker-info/${{ inputs.service_name }}-info.txt
          echo "" >> docker-info/${{ inputs.service_name }}-info.txt
          echo "=== DETALLES DE LA IMAGEN ===" >> docker-info/${{ inputs.service_name }}-info.txt
          docker inspect ${{ inputs.service_name }}:test >> docker-info/${{ inputs.service_name }}-info.txt

      - name: Subir artifact con información del contenedor
        uses: actions/upload-artifact@v4
        with:
          name: docker-info-${{ inputs.service_name }}
          path: docker-info/${{ inputs.service_name }}-info.txt
          retention-days: 30

      - name: ✅ Imagen verificada
        run: |
          docker images | grep ${{ inputs.service_name }}
          echo "✅ Imagen ${{ inputs.service_name }} construida correctamente"