name: API 2 - NestJS Build and Verify

on:
  workflow_call:
    secrets:
      MYSQL_ROOT_PASSWORD:
        required: true
      JWT_KEY:
        required: true
      JWT_ISSUER:
        required: true
      JWT_AUDIENCE:
        required: true
      API2_EMAIL_USER:
        required: true
      API2_EMAIL_PASS:
        required: true

jobs:
  build-api2:
    uses: ./.github/workflows/reusable-build.yml
    with:
      service_name: api2
      dockerfile_path: ./estadoPedidos.api/Dockerfile
      context_path: ./estadoPedidos.api
      port: "3001"
    secrets:
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      JWT_KEY: ${{ secrets.JWT_KEY }}
      JWT_ISSUER: ${{ secrets.JWT_ISSUER }}
      JWT_AUDIENCE: ${{ secrets.JWT_AUDIENCE }}
      API2_EMAIL_USER: ${{ secrets.API2_EMAIL_USER }}
      API2_EMAIL_PASS: ${{ secrets.API2_EMAIL_PASS }}

  test-api2:
    runs-on: ubuntu-latest
    needs: build-api2
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          cd estadoPedidos.api/estado-pedidos-api
          npm install

      - name: Build API 2
        run: |
          cd estadoPedidos.api/estado-pedidos-api
          npm run build

      - name: ✅ API 2 verificada
        run: echo "✅ API 2 (NestJS) build exitoso"