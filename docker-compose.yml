version: '3.8'

services:

  db1:
    image: mysql:8.0
    container_name: db1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fotografias_campos
    ports:
      - "3307:3306"
    volumes:
      - db1_data:/var/lib/mysql
      - ./docker/mysql-init/01-init-db1.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-do-db=fotografias_campos
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  db2:
    image: mysql:8.0
    container_name: db2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: estado_pedidos
    ports:
      - "3308:3306"
    volumes:
      - db2_data:/var/lib/mysql
      - ./docker/mysql-init/02-init-db2.sql:/docker-entrypoint-initdb.d/02-init.sql
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-do-db=estado_pedidos
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  db_replica:
    image: mysql:8.0
    container_name: db_replica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3309:3306"
    volumes:
      - db_replica_data:/var/lib/mysql
      - ./docker/mysql-init/03-init-replica.sql:/docker-entrypoint-initdb.d/03-init.sql
    command: >
      --server-id=3
      --relay-log=relay-log
      --read-only=1
    networks:
      - app-network
    depends_on:
      db1:
        condition: service_healthy
      db2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  replica-setup:
    image: mysql:8.0
    container_name: replica-setup
    depends_on:
      db_replica:
        condition: service_healthy
    volumes:
      - ./docker/setup-replica.sh:/setup-replica.sh
    command: bash /setup-replica.sh
    networks:
      - app-network
    restart: "no"

  api1:
    build:
      context: ./fotografiasCampos.api
      dockerfile: Dockerfile
    container_name: api1
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=${API1_DB_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpiresInMinutes=60
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:8080"
    depends_on:
      db1:
        condition: service_healthy
    networks:
      - app-network

  api2:
    build:
      context: ./estadoPedidos.api
      dockerfile: Dockerfile
    container_name: api2
    restart: always
    environment:
      - DB_HOST=${API2_DB_HOST}
      - DB_PORT=${API2_DB_PORT}
      - DB_USER=${API2_DB_USER}
      - DB_PASS=${API2_DB_PASS}
      - DB_NAME=${API2_DB_NAME}
      - JWT_SECRET=${API2_JWT_SECRET}
      - EMAIL_USER=${API2_EMAIL_USER}
      - EMAIL_PASS=${API2_EMAIL_PASS}
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      db2:
        condition: service_healthy
    networks:
      - app-network

  api3:
    build:
      context: ./QueryApi
      dockerfile: Dockerfile
    container_name: api3
    restart: always
    environment:
      - ConnectionStrings__ReplicaConnection=${API3_REPLICA_CONNECTION}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5001:8080"
    depends_on:
      db_replica:
        condition: service_healthy
    networks:
      - app-network

  proxy:
    image: nginx:alpine
    container_name: proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2
      - api3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db1_data:
  db2_data:
  db_replica_data: