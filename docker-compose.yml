version: '3.8'

services:

  # ─── BASE DE DATOS 1 (Master - API 1) ───────────────────────────
  db1:
    image: mysql:8.0
    container_name: db1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fotografias_campos
    ports:
      - "3307:3306"
    volumes:
      - db1_data:/var/lib/mysql
      - ./docker/mysql-init/01-init-db1.sql:/docker-entrypoint-initdb.d/01-init.sql
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-do-db=fotografias_campos
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── BASE DE DATOS 2 (Master - API 2) ───────────────────────────
  db2:
    image: mysql:8.0
    container_name: db2
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: estado_pedidos
    ports:
      - "3308:3306"
    volumes:
      - db2_data:/var/lib/mysql
      - ./docker/mysql-init/02-init-db2.sql:/docker-entrypoint-initdb.d/02-init.sql
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-do-db=estado_pedidos
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── BASE DE DATOS RÉPLICA (Slave - API 3) ──────────────────────
  db_replica:
    image: mysql:8.0
    container_name: db_replica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3309:3306"
    volumes:
      - db_replica_data:/var/lib/mysql
      - ./docker/mysql-init/03-init-replica.sql:/docker-entrypoint-initdb.d/03-init.sql
    command: >
      --server-id=3
      --relay-log=relay-log
      --read-only=1
    networks:
      - app-network
    depends_on:
      db1:
        condition: service_healthy
      db2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── SETUP REPLICACIÓN ──────────────────────────────────────────
  replica-setup:
    image: mysql:8.0
    container_name: replica-setup
    depends_on:
      db_replica:
        condition: service_healthy
    volumes:
      - ./docker/setup-replica.sh:/setup-replica.sh
    command: bash /setup-replica.sh
    networks:
      - app-network
    restart: "no"

  # ─── API 1 (.NET) ───────────────────────────────────────────────
  api1:
    build:
      context: ./fotografiasCampos.api
      dockerfile: Dockerfile
    container_name: api1
    restart: always
    environment:
      - ConnectionStrings__DefaultConnection=Server=db1;Port=3306;Database=fotografias_campos;User=root;Password=rootpassword;
      - Jwt__Key=ClaveSecretaSuperSegura1234567890!
      - Jwt__Issuer=FotografiasCamposApi
      - Jwt__Audience=FotografiasCamposClientes
      - Jwt__ExpiresInMinutes=60
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5000:8080"
    depends_on:
      db1:
        condition: service_healthy
    networks:
      - app-network

  # ─── API 2 (NestJS) ─────────────────────────────────────────────
  api2:
    build:
      context: ./estadoPedidos.api/estado-pedidos-api
      dockerfile: Dockerfile
    container_name: api2
    restart: always
    environment:
      - DB_HOST=db2
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=rootpassword
      - DB_NAME=estado_pedidos
      - JWT_SECRET=ClaveSecretaSuperSegura1234567890!
      - EMAIL_USER=tucorreo@gmail.com
      - EMAIL_PASS=tucontraseña
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      db2:
        condition: service_healthy
    networks:
      - app-network

  # ─── API 3 (Query .NET) ─────────────────────────────────────────
  api3:
    build:
      context: ./QueryApi
      dockerfile: Dockerfile
    container_name: api3
    restart: always
    environment:
      - ConnectionStrings__ReplicaConnection=Server=db_replica;Port=3306;Database=replica_pedidos;User=root;Password=rootpassword;
      - Jwt__Key=ClaveSecretaSuperSegura1234567890!
      - Jwt__Issuer=FotografiasCamposApi
      - Jwt__Audience=FotografiasCamposClientes
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5001:8080"
    depends_on:
      db_replica:
        condition: service_healthy
    networks:
      - app-network

  # ─── PROXY NGINX ────────────────────────────────────────────────
  proxy:
    image: nginx:alpine
    container_name: proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api1
      - api2
      - api3
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db1_data:
  db2_data:
  db_replica_data: